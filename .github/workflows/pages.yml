name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancelling previous runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.12"
          cache: npm

      - run: npm ci --no-audit --no-fund

      - run: npm run build
        env:
          # Leave unset for custom-domain deploys (site at "/"). If deploying
          # to username.github.io/<repo>/, set this in repo Settings → Variables.
          GITHUB_PAGES_BASE: ${{ vars.GITHUB_PAGES_BASE }}

      # SPA fallback: GitHub Pages serves 404.html for any unknown path.
      # Copying index.html → 404.html lets the router boot and resolve the URL
      # client-side for deep links like /data.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
